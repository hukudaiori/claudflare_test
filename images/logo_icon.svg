<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 背景グロー -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </radialGradient>
    <!-- モニターグロー -->
    <radialGradient id="screenGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a3a6e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 外枠（六角形風の角丸正方形） -->
  <rect width="200" height="200" rx="36" fill="url(#bg)"/>

  <!-- 背景グロー -->
  <rect width="200" height="200" rx="36" fill="url(#screenGlow)"/>

  <!-- コーナーアクセント -->
  <!-- 左上 -->
  <polyline points="20,42 20,20 42,20" fill="none" stroke="#00ffc8" stroke-width="3" stroke-linecap="round"/>
  <!-- 右上 -->
  <polyline points="158,20 180,20 180,42" fill="none" stroke="#00ffc8" stroke-width="3" stroke-linecap="round"/>
  <!-- 左下 -->
  <polyline points="20,158 20,180 42,180" fill="none" stroke="#00ffc8" stroke-width="3" stroke-linecap="round"/>
  <!-- 右下 -->
  <polyline points="158,180 180,180 180,158" fill="none" stroke="#00ffc8" stroke-width="3" stroke-linecap="round"/>

  <!-- PCモニター本体 -->
  <rect x="38" y="52" width="124" height="82" rx="6" fill="#0a1525" stroke="#4dc8ff" stroke-width="2"/>

  <!-- 画面内 -->
  <rect x="46" y="60" width="108" height="66" rx="3" fill="#060f1e"/>

  <!-- 画面内ターミナル風テキスト -->
  <text x="100" y="82" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#5ed4ff">&gt; LOADING...</text>
  <text x="100" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#ffb0d8">[ VN GAME ]</text>
  <text x="100" y="113" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="#4dc8ff">■■■□□ 60%</text>

  <!-- スタンド -->
  <line x1="100" y1="134" x2="100" y2="152" stroke="#4dc8ff" stroke-width="2.5"/>
  <line x1="76" y1="152" x2="124" y2="152" stroke="#4dc8ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 下部テキスト -->
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-size="8.5" font-weight="600" fill="#aaccee" letter-spacing="1">美少女ゲーム愛好会</text>
</svg>
